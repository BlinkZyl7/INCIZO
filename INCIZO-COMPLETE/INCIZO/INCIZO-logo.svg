<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Space+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="600" height="400" fill="#040608"/>

  <!-- VERSION LABELS -->
  <text x="30" y="28" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="2">VERSION 1 — LIGHT</text>
  <text x="30" y="168" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="2">VERSION 2 — DARK</text>
  <text x="30" y="298" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="2">VERSION 3 — SIGNATURE GREEN</text>

  <!-- ══════════════════════════════════════ -->
  <!-- VERSION 1 — LIGHT BG -->
  <!-- ══════════════════════════════════════ -->
  <rect x="20" y="36" width="560" height="110" rx="10" fill="white"/>

  <!-- Blade icon V1 -->
  <g transform="translate(44, 62)">
    <polygon points="0,18 16,8 22,18 16,28" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
    <polygon points="4,18 16,11 19,18 16,25" fill="#0A0A0A"/>
    <line x1="22" y1="18" x2="36" y2="18" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="31" y1="14" x2="36" y2="18" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
    <line x1="31" y1="22" x2="36" y2="18" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark V1 -->
  <text x="100" y="98" font-family="'Courier New', monospace" font-weight="900" font-size="36" fill="#0A0A0A" letter-spacing="8">INCIZO</text>
  <line x1="100" y1="107" x2="180" y2="107" stroke="#0A0A0A" stroke-width="2"/>
  <line x1="182" y1="107" x2="400" y2="107" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <text x="100" y="128" font-family="monospace" font-size="10" fill="#555" letter-spacing="3">CUT THROUGH THE NOISE</text>

  <!-- Icon V1 -->
  <rect x="480" y="50" width="70" height="70" rx="12" fill="#0A0A0A"/>
  <g transform="translate(492, 68)">
    <polygon points="0,17 13,8 19,17 13,26" fill="none" stroke="white" stroke-width="1.5"/>
    <polygon points="3,17 13,11 16,17 13,23" fill="white"/>
    <line x1="19" y1="17" x2="32" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="27" y1="13" x2="32" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="21" x2="32" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ══════════════════════════════════════ -->
  <!-- VERSION 2 — DARK BG -->
  <!-- ══════════════════════════════════════ -->
  <rect x="20" y="176" width="560" height="100" rx="10" fill="#0E1318" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Blade icon V2 -->
  <g transform="translate(44, 202)">
    <polygon points="0,18 16,8 22,18 16,28" fill="none" stroke="white" stroke-width="1.5"/>
    <polygon points="4,18 16,11 19,18 16,25" fill="white"/>
    <line x1="22" y1="18" x2="36" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="31" y1="14" x2="36" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="31" y1="22" x2="36" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark V2 -->
  <text x="100" y="236" font-family="'Courier New', monospace" font-weight="900" font-size="36" fill="white" letter-spacing="8">INCIZO</text>
  <line x1="100" y1="245" x2="180" y2="245" stroke="white" stroke-width="2"/>
  <line x1="182" y1="245" x2="400" y2="245" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <text x="100" y="262" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="3">CUT THROUGH THE NOISE</text>

  <!-- Icon V2 -->
  <rect x="480" y="188" width="70" height="70" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <g transform="translate(492, 206)">
    <polygon points="0,17 13,8 19,17 13,26" fill="none" stroke="white" stroke-width="1.5"/>
    <polygon points="3,17 13,11 16,17 13,23" fill="white"/>
    <line x1="19" y1="17" x2="32" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="27" y1="13" x2="32" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="21" x2="32" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ══════════════════════════════════════ -->
  <!-- VERSION 3 — GREEN SIGNATURE -->
  <!-- ══════════════════════════════════════ -->
  <rect x="20" y="308" width="560" height="80" rx="10" fill="#040608" stroke="rgba(0,229,160,0.15)" stroke-width="0.5"/>

  <!-- Blade icon V3 green -->
  <g transform="translate(44, 328)">
    <polygon points="0,18 16,8 22,18 16,28" fill="none" stroke="#00E5A0" stroke-width="1.5"/>
    <polygon points="4,18 16,11 19,18 16,25" fill="#00E5A0"/>
    <line x1="22" y1="18" x2="36" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="31" y1="14" x2="36" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="31" y1="22" x2="36" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark V3 — IN white, CIZO green -->
  <text x="100" y="362" font-family="'Courier New', monospace" font-weight="900" font-size="36" fill="white" letter-spacing="8">IN</text>
  <text x="158" y="362" font-family="'Courier New', monospace" font-weight="900" font-size="36" fill="#00E5A0" letter-spacing="8">CIZO</text>
  <line x1="100" y1="371" x2="154" y2="371" stroke="#00E5A0" stroke-width="2"/>
  <line x1="156" y1="371" x2="400" y2="371" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Icon V3 green -->
  <rect x="480" y="316" width="70" height="60" rx="12" fill="#00E5A0"/>
  <g transform="translate(492, 330)">
    <polygon points="0,15 12,7 17,15 12,23" fill="none" stroke="#040608" stroke-width="1.5"/>
    <polygon points="3,15 12,9 15,15 12,21" fill="#040608"/>
    <line x1="17" y1="15" x2="29" y2="15" stroke="#040608" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="11" x2="29" y2="15" stroke="#040608" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="19" x2="29" y2="15" stroke="#040608" stroke-width="2" stroke-linecap="round"/>
  </g>

</svg>
